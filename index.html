<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Martin | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #05050a; 
            --bg-glow: #1a1b3b;
            --text-color: #ffffff;
            --text-dim: #a0a0a0;
            --accent-color: #8a99ff; 
            --accent-gradient: linear-gradient(90deg, #8a99ff, #d199ff);
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 50% 30%, var(--bg-glow) 0%, var(--bg-color) 80%) fixed;
            color: var(--text-color); line-height: 1.6; overflow-x: hidden;
        }

        header {
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 10, 0.7); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(15px);
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--accent-color); }
        nav a { color: var(--text-dim); text-decoration: none; margin-left: 2rem; font-size: 0.9rem; }

        .animate-on-scroll { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .animate-on-scroll.show { opacity: 1; transform: translateY(0); }

        .profile-section { padding: 6rem 20px 3rem; text-align: center; }
        .profile-photo { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; margin-bottom: 1.5rem; }
        .profile-section h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .skills-grid { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
        .skill-tag { background: var(--card-bg); padding: 8px 22px; border-radius: 50px; border: 1px solid var(--glass-border); color: var(--text-dim); font-size: 0.85rem; }

        .portfolio-section { padding: 5rem 10%; }
        .section-title { text-align: center; font-size: 1.8rem; margin-bottom: 3.5rem; letter-spacing: 4px; font-weight: 300; text-transform: uppercase; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
        .reels-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        /* THE MOBILE ALIGNMENT FIX */
        .video-container { 
            width: 100%; position: relative; background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; /* Flex-centering anchor */
        }
        .horizontal-box { aspect-ratio: 16 / 9; }
        .vertical-box   { aspect-ratio: 9 / 16; }

        .drive-video-player { 
            position: absolute; width: 100%; height: 100%; border: none; 
        }

        @media (max-width: 768px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            .reels-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .portfolio-section { padding: 3rem 4%; }
            
            /* FORCING CENTERING & ANTI-STRETCH */
            .vertical-box .drive-video-player {
                width: 110%; /* Scaled down zoom */
                height: 100%;
                left: 50%; top: 50%;
                transform: translate(-50%, -50%); /* DEAD CENTER LOCK */
                object-fit: cover; 
            }
        }

        .grid-item { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); transition: 0.4s; }
        .grid-item:hover { transform: translateY(-8px); border-color: rgba(138, 153, 255, 0.5); }
        .project-info { padding: 1.2rem; }
        .project-info h3 { margin: 0; font-size: 1rem; color: #fff; }

        .gallery-wrapper { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 25px; scroll-snap-type: x mandatory; }
        .gallery-item { flex: 0 0 auto; scroll-snap-align: start; border-radius: 12px; overflow: hidden; height: 300px; background: #111; border: 1px solid var(--glass-border); }
        .gallery-item img { height: 100%; width: auto; object-fit: contain; }

        .visitor-counter { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 12px 28px; margin: 2rem auto; width: fit-content; background: var(--card-bg); border-radius: 50px; color: var(--text-dim); border: 1px solid var(--glass-border); }

        .contact-section { padding: 6rem 10%; text-align: center; }
        .social-link { color: var(--text-dim); text-decoration: none; font-size: 2rem; display: inline-block; margin: 0 20px; transition: 0.3s; }
        .social-link:hover { color: #fff; transform: translateY(-5px); }
        .btn { display: inline-block; padding: 14px 45px; background: #fff; color: #000; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 2rem; }

        footer { text-align: center; padding: 3rem; color: #444; font-size: 0.8rem; border-top: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <header>
        <div class="logo">Alan<span>Martin</span></div>
        <nav>
            <a href="#gallery">Gallery</a>
            <a href="#widescreen">Horizontal</a>            
            <a href="#reels">Vertical</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="profile-section">
        <img src="photo_2025-03-24_20-06-39.jpg" alt="Alan Martin" class="profile-photo animate-on-scroll">
        <h1 class="animate-on-scroll">Alan Martin</h1>
        <p class="animate-on-scroll">Video Editor & Motion Graphics Artist</p>
        <div class="skills-grid">
            <div class="skill-tag animate-on-scroll">After Effects</div>
            <div class="skill-tag animate-on-scroll">Premiere Pro</div>
            <div class="skill-tag animate-on-scroll">Davinci Resolve</div>
        </div>
    </section>

    <section id="gallery" class="portfolio-section">
        <h2 class="section-title animate-on-scroll">Images</h2>
        <div class="gallery-wrapper animate-on-scroll">
            <div class="gallery-item"><img src="https://lh3.googleusercontent.com/u/0/d/1zzw4nc-1YRqTYo0eVXVHjfpbxNw8A0BX"></div>
            <div class="gallery-item"><img src="https://lh3.googleusercontent.com/u/0/d/1TXu-X-RZFuXR9gAximddvpxB4DbwD0Hr"></div>
            <div class="gallery-item"><img src="https://lh3.googleusercontent.com/u/0/d/1-5mSDJULU04Wl1NCANypG2XmzraOGHvH"></div>
            <div class="gallery-item"><img src="https://lh3.googleusercontent.com/u/0/d/1zh1F_FZgKd-T0cbnc-XG34OkaQKBGDR8"></div>
        </div>
    </section>

    <section id="widescreen" class="portfolio-section">
        <h2 class="section-title animate-on-scroll">Horizontal</h2>
        <div class="portfolio-grid">
            <div class="grid-item animate-on-scroll">
                <div class="video-container horizontal-box">
                    <iframe class="drive-video-player" src="https://drive.google.com/file/d/1zlH1Q76rzMLgVhLHWW185NxoQazGWMJE/preview" allowfullscreen></iframe>
                </div>
            </div>
            <div class="grid-item animate-on-scroll">
                <div class="video-container horizontal-box">
                    <iframe class="drive-video-player" src="https://drive.google.com/file/d/1OVRZbh-JURDo2iyf_zvHIdl9wveqUKBn/preview" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </section>

    <section id="reels" class="portfolio-section">
        <h2 class="section-title animate-on-scroll">Vertical</h2>
        <div class="reels-grid">
            <div class="grid-item animate-on-scroll">
                <div class="video-container vertical-box">
                    <iframe class="drive-video-player" src="https://drive.google.com/file/d/1Qi4PwJ7kTrj4Ut5ISAn3P4JK9E7RUMio/preview" allowfullscreen></iframe>
                </div>
            </div>
            <div class="grid-item animate-on-scroll">
                <div class="video-container vertical-box">
                    <iframe class="drive-video-player" src="https://drive.google.com/file/d/1FVP4V-R2h3hzfADqkZj_qtYv9tGrsm6V/preview" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </section>

    <div class="visitor-counter">
        <i class="fas fa-eye"></i> <span id="visit-count">0</span> views
    </div>

    <section id="contact" class="contact-section">
        <h2 class="animate-on-scroll">READY TO START?</h2>
        <div class="contact-container">
            <a href="mailto:martinalan586@gmail.com" class="social-link animate-on-scroll"><i class="fas fa-envelope"></i></a>
            <a href="https://www.instagram.com/syfics.ae/" target="_blank" class="social-link animate-on-scroll"><i class="fab fa-instagram"></i></a>
        </div>
        <a href="mailto:martinalan586@gmail.com" class="btn animate-on-scroll">Hire Me</a>
    </section>

    <footer><p>© 2026 Alan Martin.</p></footer>

    <script>
        (function () {
            const NAMESPACE = 'alanmartin-portfolio';
            const KEY = 'views';
            fetch('https://api.countapi.xyz/hit/' + NAMESPACE + '/' + KEY)
                .then(r => r.json()).then(data => {
                    const el = document.getElementById('visit-count');
                    if(el) el.textContent = data.value.toLocaleString();
                }).catch(() => { if(document.getElementById('visit-count')) document.getElementById('visit-count').textContent = '—'; });
        })();

        document.addEventListener("DOMContentLoaded", function () {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
